## DoubleEnsemble + 深度模型打分 stacking 实验配置
## 在原 Alpha158 特征基础上，追加 GRU/LSTM/GATs 基于 Alpha360 的预测打分作为 3 个新特征。
## 深度模型打分由 examples/benchmarks/_gen_stacking_features.py 预先生成，存于 _oof_v2_scores.pkl。
## 通过 NestedDataLoader 把 Alpha158DL 与 StaticDataLoader(深度打分) 拼接。
qlib_init:
    provider_uri: "~/.qlib/qlib_data/cn_data"
    region: cn
market: &market csi300
benchmark: &benchmark SH000300
data_handler_config: &data_handler_config
    ## DataHandlerLP 只接受 instruments/start_time/end_time/data_loader/*processors，
    ## 不接受 fit_start_time/fit_end_time（那是 Alpha158 等具体 handler 才有的字段）。
    start_time: 2013-01-01
    end_time: 2020-08-01
    instruments: *market
    ## 用 NestedDataLoader 组合 Alpha158 因子 + 深度模型打分 + label
    data_loader:
        class: NestedDataLoader
        module_path: qlib.data.dataset.loader
        kwargs:
            join: left
            dataloader_l:
                ## 1) 原始 Alpha158 因子
                - class: qlib.contrib.data.loader.Alpha158DL
                ## 2) GRU/LSTM/GATs 基于 Alpha360 的预测打分（预生成的 pkl）
                - class: qlib.data.dataset.loader.StaticDataLoader
                  kwargs:
                      config:
                          feature: "/Users/xuxin/Documents/dev/qlib/examples/benchmarks/_oof_v2_scores.pkl"
                ## 3) label（与 Alpha158 默认一致：次日到后日收益）
                - class: qlib.contrib.data.loader.Alpha158DL
                  kwargs:
                      config:
                          label: [["Ref($close, -2)/Ref($close, -1) - 1"], ["LABEL0"]]
    ## 处理器：与原始 DoubleEnsemble/Alpha158 保持一致（Alpha158 默认 infer_processors 为空，
    ## 树模型无需特征标准化）。只在 learn 阶段丢弃无标签样本，保证与基线唯一差异 = 3 列深度打分。
    infer_processors: []
    learn_processors:
        - class: DropnaLabel
port_analysis_config: &port_analysis_config
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            topk: 50
            n_drop: 5
    backtest:
        start_time: 2017-01-01
        end_time: 2020-08-01
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            limit_threshold: 0.095
            deal_price: close
            open_cost: 0.0005
            close_cost: 0.0015
            min_cost: 5
task:
    model:
        class: DEnsembleModel
        module_path: qlib.contrib.model.double_ensemble
        kwargs:
            base_model: "gbm"
            loss: mse
            num_models: 3
            enable_sr: True
            enable_fs: True
            alpha1: 1
            alpha2: 1
            bins_sr: 10
            bins_fs: 5
            decay: 0.5
            sample_ratios:
                - 0.8
                - 0.7
                - 0.6
                - 0.5
                - 0.4
            sub_weights:
                - 1
                - 1
                - 1
            epochs: 28
            colsample_bytree: 0.8879
            learning_rate: 0.2
            subsample: 0.8789
            lambda_l1: 205.6999
            lambda_l2: 580.9768
            max_depth: 8
            num_leaves: 210
            num_threads: 20
            verbosity: -1
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                ## 用通用 DataHandlerLP + 上面定义的 NestedDataLoader
                class: DataHandlerLP
                module_path: qlib.data.dataset.handler
                kwargs: *data_handler_config
            segments:
                train: [2013-01-01, 2014-12-31]  # v2: 只用B段训练，深度打分完整且与valid/test同源(数据量2年,固有权衡)
                valid: [2015-01-01, 2016-12-31]
                test: [2017-01-01, 2020-08-01]
    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            ana_long_short: False
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            config: *port_analysis_config
